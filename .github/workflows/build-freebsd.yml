name: Build for FreeBSD

on:
  push:
    branches: [ main ]
  pull_request:
  # 允许手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [freebsd]
        goarch: [amd64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build for ${{ matrix.goos }} on ${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: $matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          # 下载依赖
          go mod download
          # 编译，-o 指定输出文件名
          go build -o baihu-server-${{ matrix.goos }}-${{ matrix.goarch }} ./main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: baihu-server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: baihu-server-${{ matrix.goos }}-${{ matrix.goarch }}
