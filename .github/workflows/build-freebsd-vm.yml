name: 官方标准编译 白虎面板 FreeBSD 单文件
on:
  workflow_dispatch: # 手动触发（推荐）

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取作者官方源码
        uses: actions/checkout@v4
        with:
          repository: engigu/baihu-panel
          fetch-depth: 1

      # 1. 安装 Node.js 构建前端（必须！生成dist文件）
      - name: 安装 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 构建前端生成静态资源
        run: |
          cd frontend
          npm install
          npm run build
          # 把构建好的dist复制到Go嵌入目录（作者官方路径）
          cp -r dist ../internal/static/

      # 2. 安装 Go 环境
      - name: 安装 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 3. 核心：启用 -tags web 编译 FreeBSD 纯静态二进制
      - name: 交叉编译 Serv00 适配版
        run: |
          CGO_ENABLED=0 GOOS=freebsd GOARCH=amd64 go build -trimpath -tags web -ldflags "-w -s" -o baihu-panel

      # 4. 上传最终单文件
      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: baihu-panel-freebsd-serv00
          path: baihu-panel
