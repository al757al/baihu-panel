name: Build for FreeBSD using VM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-freebsd:
    runs-on: ubuntu-latest # vmactions/freebsd-vm 在某些 Ubuntu 版本上有兼容性问题，macOS 运行更稳定
    steps:
      - uses: actions/checkout@v4
      
      - name: Build in FreeBSD VM
        id: test
        uses: vmactions/freebsd-vm@v1.0.7
        with:
          envs: 'MY_ENV my_secret'
          usesh: true
          prepare: |
            pkg install -y go node

          run: |
            # 设置 Go 环境
            export PATH=$PATH:/usr/local/go/bin
            # 下载前端依赖并构建
            cd web
            npm install
            npm run build
            cd ..
            # 编译后端
            go build -o baihu-server-freebsd ./main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: baihu-server-freebsd
          path: baihu-server-freebsd
