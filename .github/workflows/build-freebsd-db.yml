name: Build Baihu Panel for FreeBSD (Serv00)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-freebsd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: engigu/baihu-panel
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: go.sum

      - name: Build frontend (Vue 3)
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Prepare embedded assets
        run: |
          mkdir -p internal/static/dist
          cp -r web/dist/* internal/static/dist/

      - name: Get version info
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build_time=$(date '+%Y/%m/%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Build Go binary for FreeBSD
        env:
          GOOS: freebsd
          GOARCH: amd64  # ← 直接指定架构，不使用变量
          CGO_ENABLED: 0
        run: |
          mkdir -p bin
          go build \
            -tags web \
            -ldflags="-s -w -X 'github.com/engigu/baihu-panel/internal/constant.Version=${{ steps.version.outputs.version }}' -X 'github.com/engigu/baihu-panel/internal/constant.BuildTime=${{ steps.version.outputs.build_time }}'" \
            -o bin/baihu-freebsd-amd64 \
            main.go

      - name: Verify binary
        run: |
          file bin/baihu-freebsd-amd64
          ls -lh bin/baihu-freebsd-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: baihu-freebsd-amd64
          path: bin/baihu-freebsd-amd64

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/baihu-freebsd-amd64
          generate_release_notes: true
