name: 白虎面板 FreeBSD 编译 (Serv00专用)
on:
  workflow_dispatch:  # 手动触发编译（推荐）

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取作者官方源码
      - name: 检出源码
        uses: actions/checkout@v4
        with:
          repository: engigu/baihu-panel
          fetch-depth: 1

      # 2. 安装Go环境
      - name: 设置Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 3. 核心编译：启用官方 web 标签 + FreeBSD 纯静态编译
      - name: 编译单文件二进制
        run: |
          CGO_ENABLED=0 GOOS=freebsd GOARCH=amd64 go build -trimpath -tags web -ldflags "-w -s" -o baihu-panel

      # 4. 上传最终可执行文件
      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: baihu-panel-freebsd
          path: baihu-panel
